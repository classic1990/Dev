<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - DUY-DOE FILM</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="/assets/css/style-modern.css">
    <link rel="stylesheet" href="/assets/css/login-style.css">

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#e50914">

    <!-- Security -->
    <meta name="robots" content="noindex, nofollow">
</head>

<body class="login-page">

    <!-- 🔴 LOGIN CONTAINER -->
    <div class="login-container">

        <!-- LOGIN CARD -->
        <div class="login-card">

            <!-- LOGO SECTION -->
            <div class="login-logo">
                <div class="logo-icon">
                    <i class="fas fa-film logo-icon"></i>
                    <div class="logo-content">
                        <span class="logo-line main">DUY-DEE</span>
                        <span class="logo-line hd">HD</span>
                    </div>
                </div>
                <p>ระบบจัดการหนังออนไลน์</p>
            </div>

            <!-- LOGIN FORM -->
            <form id="loginForm" class="login-form">

                <!-- ERROR MESSAGE -->
                <div id="errorMessage" class="error-message" style="display: none;">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span id="errorText"></span>
                </div>

                <!-- SUCCESS MESSAGE -->
                <div id="successMessage" class="success-message" style="display: none;">
                    <i class="fas fa-check-circle"></i>
                    <span id="successText"></span>
                </div>

                <!-- USERNAME -->
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i> ชื่อผู้ใช้
                    </label>
                    <input type="text" id="username" name="username" required class="form-input"
                        placeholder="กรอกชื่อผู้ใช้">
                </div>

                <!-- PASSWORD -->
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> รหัสผ่าน
                    </label>
                    <div class="password-input">
                        <input type="password" id="password" name="password" required class="form-input"
                            placeholder="กรอกรหัสผ่าน">
                        <button type="button" id="togglePassword" class="toggle-password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- REMEMBER ME -->
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkmark"></span>
                        จำฉันไว้
                    </label>
                </div>

                <!-- LOGIN BUTTON -->
                <button type="submit" class="btn btn-primary btn-large btn-full" id="loginSubmitBtn">
                    <i class="fas fa-sign-in-alt"></i> เข้าสู่ระบบ
                </button>

                <!-- OR DIVIDER -->
                <div class="login-divider">
                    <span>หรือ</span>
                </div>

                <!-- GOOGLE LOGIN -->
                <button type="button" id="googleLoginBtn" class="btn btn-google btn-large btn-full">
                    <i class="fab fa-google"></i> เข้าสู่ระบบด้วย Google
                </button>

            </form>

            <!-- FOOTER -->
            <div class="login-footer">
                <p>DUY-DOE FILM © 2026</p>
                <p>ระบบสำหรับผู้ดูแลเท่านั้น</p>
            </div>

        </div>

        <!-- BACKGROUND ANIMATION -->
        <div class="login-background">
            <div class="particles"></div>
            <div class="film-strip"></div>
        </div>

    </div>

    <!-- 🔥 FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <!-- Google Sign-In -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <script src="/assets/js/core/firebase-config.js"></script>

    <!-- 🧠 LOGIN SCRIPT -->
    <script src="/assets/js/login-script.js"></script>

</body>

</html>
