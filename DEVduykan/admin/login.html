<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>Admin Login - DUYDODEE 4K</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #020617;
            color: #e2e8f0;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <!-- แก้ไขโลโก้ตรงนี้ (ใช้ Path ../ เพราะไฟล์นี้อยู่ในโฟลเดอร์ admin) -->
            <img src="../assets/img/logo.png" alt="DUYDODEE 4K Logo" class="h-12 mx-auto">
            <p class="text-slate-400 mt-2">Admin Panel</p>
        </div>
        <form id="loginForm"
            class="bg-slate-900 p-8 rounded-3xl border border-slate-800 space-y-6 shadow-[0_0_50px_rgba(220,38,38,0.1)]">
            <div>
                <label for="email" class="text-sm font-bold text-slate-400">Email</label>
                <input type="email" id="email" placeholder="admin@email.com"
                    class="mt-2 w-full bg-slate-950 border border-slate-700 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 transition"
                    required>
            </div>
            <div>
                <label for="password" class="text-sm font-bold text-slate-400">Password</label>
                <input type="password" id="password" placeholder="••••••••"
                    class="mt-2 w-full bg-slate-950 border border-slate-700 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 transition"
                    required>
            </div>
            <button type="submit" id="loginButton"
                class="w-full bg-red-600 hover:bg-red-700 py-3 rounded-xl font-bold transition flex items-center justify-center gap-2">เข้าสู่ระบบ</button>
            <p id="errorMessage" class="text-center text-red-500 text-sm h-4"></p>
        </form>
    </div>

    <script type="module">
        import { auth } from '../firebase-config.js';
        import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const loginButton = document.getElementById('loginButton');

        onAuthStateChanged(auth, (user) => {
            if (user) { window.location.replace('/admin'); }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.textContent = '';
            loginButton.disabled = true;
            loginButton.textContent = 'กำลังตรวจสอบ...';
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
            } catch (error) {
                errorMessage.textContent = 'อีเมลหรือรหัสผ่านไม่ถูกต้อง';
                loginButton.disabled = false;
                loginButton.textContent = 'เข้าสู่ระบบ';
            }
        });
    </script>

</body>

</html>
