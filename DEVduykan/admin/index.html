<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>Admin - DUYDODEE 4K</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #020617;
            color: #e2e8f0;
        }
    </style>
</head>

<body class="p-6">
    <div id="adminPanel" class="max-w-4xl mx-auto hidden">
        <div class="flex justify-between items-center mb-10">
            <!-- แก้ไขโลโก้ตรงนี้ (ใช้ Path ../ เพราะไฟล์นี้อยู่ในโฟลเดอร์ admin) -->
            <img src="../assets/img/logo.png" alt="DUYDODEE 4K Logo" class="h-10">
            <div class="flex items-center gap-4">
                <a href="/" target="_blank"
                    class="bg-slate-800 px-4 py-2 rounded-xl text-sm hover:bg-slate-700 transition">กลับหน้าเว็บ</a>
                <button id="logoutBtn"
                    class="bg-red-800 px-4 py-2 rounded-xl text-sm hover:bg-red-700 transition">ออกจากระบบ</button>
            </div>
        </div>

        <form id="movieForm"
            class="bg-slate-900 p-6 rounded-3xl border border-slate-800 grid grid-cols-1 md:grid-cols-2 gap-4 mb-10 shadow-[0_0_50px_rgba(220,38,38,0.1)]">
            <input type="hidden" id="editId">
            <input type="text" id="title" placeholder="ชื่อเรื่อง"
                class="bg-slate-950 border border-slate-700 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 transition"
                required>
            <input type="text" id="ytId" placeholder="YouTube Video ID"
                class="bg-slate-950 border border-slate-700 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 transition"
                required>
            <select id="category"
                class="bg-slate-950 border border-slate-700 p-3 rounded-xl text-slate-400 focus:outline-none focus:ring-2 focus:ring-red-500 transition">
                <option value="china">ซีรีส์จีน</option>
                <option value="inter">พากย์ไทย/ฝรั่ง</option>
                <option value="anime">อนิเมะ</option>
            </select>
            <input type="text" id="posterUrl" placeholder="URL รูปโปสเตอร์ (เว้นว่างเพื่อใช้จาก YouTube)"
                class="bg-slate-950 border border-slate-700 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 transition">
            <div class="md:col-span-2 flex gap-4">
                <button type="submit" id="saveButton"
                    class="flex-1 bg-red-600 hover:bg-red-700 py-3 rounded-xl font-bold transition">เพิ่มวิดีโอ</button>
                <button type="button" id="cancelButton"
                    class="flex-1 bg-slate-700 hover:bg-slate-600 py-3 rounded-xl font-bold transition hidden">ยกเลิก</button>
            </div>
        </form>

        <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800">
            <h2 class="text-xl font-bold mb-4">รายการทั้งหมด</h2>
            <div id="list" class="space-y-2">
                <!-- Loading Spinner -->
                <div class="text-center py-10">
                    <i class="fas fa-spinner fa-spin text-3xl text-slate-500"></i>
                    <p class="mt-2 text-slate-500">กำลังโหลดรายการ...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="../assets/js/admin-logic.js"></script>
</body>

</html>
